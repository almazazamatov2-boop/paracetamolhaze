<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Fate Overlay</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@900&family=Martian+Mono:wght@800&display=swap" rel="stylesheet">
    <style>
        :root {
            --panel-top: 40px;
            --panel-radius: 18px;
            --panel-bg-color: #101014;
            --white: #ffffff;
            --num-color: #ffffff;
            --muted: rgba(255, 255, 255, 0.78);
            --green: #28d17c;
            --red: #ff4d4d;
            
            --name-size: 58px;
            --title-size: 32px;
            --num-size: 108px;
            --vs-size: 66px;
            --label-bg: rgba(0, 0, 0, 0.45);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            width: 1620px;
            height: 290px;
            overflow: hidden;
            background: transparent;
            font-family: 'Inter', sans-serif;
        }

        #wrap {
            position: absolute;
            left: 50%;
            top: var(--panel-top);
            width: 1600px;
            height: 220px;
            transform: translate(-50%, -280px);
            opacity: 0;
            border-radius: var(--panel-radius);
            background-color: var(--panel-bg-color);
            background-size: cover;
            background-position: center;
            box-shadow: 0 14px 45px rgba(0, 0, 0, .45);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 60px;
            transition: transform 650ms cubic-bezier(0.19, 1, 0.22, 1), opacity 260ms ease;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        #wrap.show { transform: translate(-50%, 0); opacity: 1; }
        #wrap.hide { transform: translate(-50%, -280px); opacity: 0; }

        /* Left Side (Avatar + Nick) */
        #left {
            display: flex;
            align-items: center;
            gap: 20px;
            min-width: 450px;
        }

        #avatar {
            width: 100px;
            height: 100px;
            border-radius: 14px;
            background: #222;
            object-fit: cover;
            box-shadow: 0 8px 16px rgba(0,0,0,0.3);
        }

        #user {
            font-size: var(--name-size);
            font-weight: 900;
            color: var(--white);
            text-shadow: 0 6px 24px rgba(0,0,0,.65);
            text-transform: uppercase;
        }

        /* Center (Numbers) */
        #center {
            display: flex;
            align-items: center;
            gap: 40px;
            transition: transform 0.2s;
        }

        .col { text-align: center; }
        .labelWrap {
            display: inline-block;
            background: var(--label-bg);
            border-radius: 10px;
            padding: 6px 16px;
            box-shadow: 0 8px 20px rgba(0,0,0,.25);
            margin-bottom: 8px;
        }

        .label {
            font-size: 20px;
            font-weight: 800;
            color: var(--muted);
            text-transform: uppercase;
            line-height: 1;
        }

        .num {
            font-size: var(--num-size);
            font-weight: 900;
            font-family: 'Martian Mono', monospace;
            color: var(--num-color);
            line-height: 1;
            min-width: 180px;
            text-shadow: 0 10px 28px rgba(0,0,0,.75);
        }

        #vs {
            font-size: var(--vs-size);
            font-weight: 900;
            color: var(--white);
            opacity: .15;
        }

        /* Right Side (Reward) */
        #right {
            display: flex;
            align-items: center;
            gap: 20px;
            min-width: 450px;
            justify-content: flex-end;
            text-align: right;
        }

        #rewardTitle {
            font-size: var(--title-size);
            font-weight: 900;
            color: var(--white);
            line-height: 1.1;
            text-shadow: 0 6px 24px rgba(0,0,0,.65);
            text-transform: uppercase;
        }

        #rewardImg {
            width: 140px;
            height: 140px;
            padding: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #rewardImg img { width: 100%; height: 100%; object-fit: contain; filter: drop-shadow(0 12px 18px rgba(0,0,0,.5)); }

        /* Badge Overlay */
        #badge {
            position: absolute;
            right: 40px;
            bottom: -20px;
            font-size: 32px;
            font-weight: 900;
            padding: 10px 30px;
            border-radius: 999px;
            opacity: 0;
            transform: scale(.8);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 100;
        }
        #badge.show { opacity: 1; transform: scale(1) translateY(-30px); }
        #badge.win { background: rgba(40,209,124,.2); color: var(--green); border: 1px solid rgba(40,209,124,.4); box-shadow: 0 10px 30px rgba(40,209,124,0.3); }
        #badge.lose { background: rgba(255,77,77,.15); color: var(--red); border: 1px solid rgba(255,77,77,.3); }

        /* Animations */
        .rollFlash { animation: flash .1s linear infinite; }
        @keyframes flash { 0%,100% { opacity: 1 } 50% { opacity: .4 } }

        .shake { animation: shake .4s ease-in-out; }
        @keyframes shake {
            0%, 100% { transform: translate(0, 0); }
            20% { transform: translate(-10px, 0); }
            40% { transform: translate(10px, 0); }
            60% { transform: translate(-7px, 0); }
            80% { transform: translate(7px, 0); }
        }

    </style>
</head>
<body>
    <div id="wrap">
        <div id="left">
            <img src="" id="avatar">
            <div id="user">VIEWER</div>
        </div>

        <div id="center">
            <div class="col">
                <div class="labelWrap"><div class="label">Число зрителя</div></div>
                <div class="num" id="pickNum">00</div>
            </div>
            <div id="vs">VS</div>
            <div class="col">
                <div class="labelWrap"><div class="label">Число рандома</div></div>
                <div class="num" id="rollNum">00</div>
            </div>
        </div>

        <div id="right">
            <div id="rewardTitle">REWARD</div>
            <div id="rewardImg"></div>
        </div>

        <div id="badge"></div>
    </div>

    <!-- Audio Placeholders -->
    <audio id="sIn" preload="auto"></audio>
    <audio id="sRoll" preload="auto"></audio>
    <audio id="sWin" preload="auto"></audio>
    <audio id="sLose" preload="auto"></audio>
    <audio id="sOut" preload="auto"></audio>

    <script>
        // === ТАЙМИНГИ (согласно запросу) ===
        const T_IN    = 650;
        const T_STAND = 1000;
        const T_ROLL  = 3000;
        const T_AFTER = 1000;
        const T_OUT   = 650;
        // ===================================

        const urlParams = new URLSearchParams(window.location.search);
        const userId = urlParams.get('id');
        let isRunning = false;
        let lastTriggerId = null;

        async function loadAssets() {
            if (!userId) return;
            try {
                const res = await fetch(`/api/ov_upload?userId=${userId}`);
                const assets = await res.json();
                if (assets.panel_bg) document.getElementById('wrap').style.backgroundImage = `url(${assets.panel_bg})`;
                if (assets.reward_img) document.getElementById('rewardImg').innerHTML = `<img src="${assets.reward_img}">`;
                if (assets.s_in) document.getElementById('sIn').src = assets.s_in;
                if (assets.s_roll) document.getElementById('sRoll').src = assets.s_roll;
                if (assets.s_win) document.getElementById('sWin').src = assets.s_win;
                if (assets.s_lose) document.getElementById('sLose').src = assets.s_lose;
                if (assets.s_out) document.getElementById('sOut').src = assets.s_out;
            } catch (e) {}
        }

        async function loadSettings() {
            if (!userId) return;
            try {
                const res = await fetch(`/api/ov_settings?userId=${userId}`);
                const settings = await res.json();
                if (settings.reward_name) document.getElementById('rewardTitle').textContent = settings.reward_name;
            } catch (e) {}
        }

        async function checkTrigger() {
            if (isRunning || !userId) return;
            try {
                const res = await fetch(`/api/ov_trigger?userId=${userId}`);
                const data = await res.json();
                if (data && data.triggerId && data.triggerId !== lastTriggerId) {
                    lastTriggerId = data.triggerId;
                    animate(data);
                }
            } catch (e) {}
        }

        function play(id) {
            const a = document.getElementById(id);
            if (a && a.src) { a.currentTime = 0; a.play().catch(e => {}); }
        }

        const sleep = ms => new Promise(r => setTimeout(r, ms));

        async function animate(data) {
            isRunning = true;
            const wrap = document.getElementById('wrap');
            const userEl = document.getElementById('user');
            const avatarEl = document.getElementById('avatar');
            const pickEl = document.getElementById('pickNum');
            const rollEl = document.getElementById('rollNum');
            const badge = document.getElementById('badge');
            const center = document.getElementById('center');

            // Reset
            badge.className = "";
            badge.textContent = "";
            center.classList.remove('shake');
            rollEl.classList.remove('rollFlash');
            rollEl.style.color = "var(--white)";

            // Set Data
            userEl.textContent = data.userName;
            if (data.userAvatar) avatarEl.src = data.userAvatar;
            pickEl.textContent = data.userChoice.toString().padStart(2, '0');
            rollEl.textContent = "00";

            // 1. IN
            wrap.classList.remove('hide');
            wrap.classList.add('show');
            play('sIn');
            await sleep(T_IN);

            // 2. STAND
            await sleep(T_STAND);

            // 3. ROLL
            play('sRoll');
            rollEl.classList.add('rollFlash');
            const startRoll = Date.now();
            while (Date.now() - startRoll < T_ROLL) {
                rollEl.textContent = Math.floor(Math.random() * 99 + 1).toString().padStart(2, '0');
                await sleep(60);
            }
            rollEl.classList.remove('rollFlash');

            // Set Result
            let resultNum = data.isTest ? (Math.random() > 0.5 ? data.userChoice : Math.floor(Math.random() * 99 + 1)) : Math.floor(Math.random() * 99 + 1);
            rollEl.textContent = resultNum.toString().padStart(2, '0');

            const isWin = parseInt(rollEl.textContent) === parseInt(pickEl.textContent);
            badge.textContent = isWin ? "ПОБЕДА!" : "ПРОИГРЫШ";
            badge.classList.add('show', isWin ? 'win' : 'lose');
            rollEl.style.color = isWin ? "var(--green)" : "var(--red)";
            if (isWin) play('sWin'); else { play('sLose'); center.classList.add('shake'); }

            // 4. AFTER (Stay)
            await sleep(T_AFTER);

            // 5. OUT
            play('sOut');
            wrap.classList.remove('show');
            wrap.classList.add('hide');
            await sleep(T_OUT);

            isRunning = false;
        }

        if (userId) {
            loadAssets();
            loadSettings();
            setInterval(checkTrigger, 3000);
        }
    </script>
</body>
</html>
