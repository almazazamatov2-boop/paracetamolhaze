<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fate Overlays — Дашборд</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Bebas+Neue&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0c0c0c;
            --sidebar: #111111;
            --card: #1a1a1a;
            --border: #333333;
            --text: #e8e8e8;
            --text-muted: #999999;
            --purple: #7c3aed;
            --green: #22c55e;
            --red: #ef4444;
            --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; height: 100vh; display: flex; overflow: hidden; }

        #preloader { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 1000; transition: opacity 0.6s; }
        .loader-logo { font-family: 'Bebas Neue', sans-serif; font-size: 48px; letter-spacing: 5px; animation: pulse 1.5s infinite; }
        .loader-logo span { color: var(--purple); }
        @keyframes pulse { 0%, 100% { opacity: 0.3; transform: scale(0.95); } 50% { opacity: 1; transform: scale(1); } }

        aside { width: 240px; background: var(--sidebar); border-right: 1px solid var(--border); padding: 24px 20px; display: flex; flex-direction: column; position: fixed; top: 0; left: 0; bottom: 0; z-index: 100; }
        .logo { font-family: 'Bebas Neue', sans-serif; font-size: 24px; letter-spacing: 3px; margin-bottom: 32px; }
        .logo span { color: var(--purple); }

        .user-panel { display: flex; align-items: center; gap: 12px; padding: 14px; background: #1a1a1a; border-radius: 12px; margin-bottom: 32px; }
        #user-avatar { width: 36px; height: 36px; border-radius: 50%; background: var(--purple); object-fit: cover; }
        .user-name { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .nav-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; color: var(--text-muted); margin: 24px 0 12px 0; }
        .nav-item { display: flex; align-items: center; gap: 12px; padding: 12px 14px; border-radius: 10px; font-size: 14px; font-weight: 500; color: var(--text); text-decoration: none; cursor: pointer; border: none; background: none; width: 100%; transition: var(--transition); }
        .nav-item:hover { background: rgba(255,255,255,0.05); }
        .nav-item.active { background: rgba(124, 58, 237, 0.1); color: #a855f7; }
        .nav-item svg { width: 18px; color: currentColor; }

        main { flex: 1; margin-left: 240px; padding: 32px 64px; width: calc(100% - 240px); height: 100vh; display: flex; flex-direction: column; }
        .page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; flex-shrink: 0; }
        .page-title { font-family: 'Bebas Neue', sans-serif; font-size: 42px; letter-spacing: 1px; margin-bottom: 0; }

        .dashboard-grid { display: grid; grid-template-columns: 1fr 1.6fr; gap: 32px; flex: 1; min-height: 0; width: 100%; }
        .grid-col { display: flex; flex-direction: column; gap: 24px; min-height: 0; overflow-y: auto; padding-right: 4px; }
        
        /* Custom Scrollbar */
        .grid-col::-webkit-scrollbar { width: 4px; }
        .grid-col::-webkit-scrollbar-track { background: transparent; }
        .grid-col::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

        .card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 24px; }
        .card-header { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
        .card-header svg { color: var(--purple); width: 20px; }
        .card-title { font-size: 14px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }

        .label { display: block; font-size: 11px; font-weight: 700; color: var(--text-muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
        input { width: 100%; background: #222222; border: 1px solid #3d3d3d; border-radius: 10px; padding: 12px 16px; color: var(--text); font-size: 14px; outline: none; transition: var(--transition); }
        input:focus { border-color: var(--purple); background: #2a2a2a; }

        .obs-box { display: flex; gap: 10px; background: #161616; padding: 8px; border-radius: 12px; border: 1px solid var(--border); }
        .obs-url { flex: 1; padding: 8px 12px; font-family: monospace; font-size: 13px; color: #a855f7; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; align-self: center; }

        .btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; padding: 12px 20px; border-radius: 10px; font-size: 13px; font-weight: 700; cursor: pointer; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); border: none; color: #fff; text-transform: uppercase; }
        .btn-purple { background: var(--purple); box-shadow: 0 4px 12px rgba(124, 58, 237, 0.2); }
        .btn-purple:hover { background: #8b5cf6; transform: translateY(-1px); }
        .btn-purple:active { transform: translateY(0); }
        .btn-green { background: var(--green); }
        .btn-green:hover { background: #16a34a; }
        .btn-icon { background: rgba(255,255,255,0.05); padding: 10px; }
        .btn-icon:hover { background: rgba(255,255,255,0.1); }

        .btn-saving { background: #5b21b6; pointer-events: none; opacity: 0.8; }
        .btn-success { background: var(--green) !important; box-shadow: 0 0 20px rgba(34, 197, 94, 0.4); }

        .asset-list { display: flex; flex-direction: column; gap: 12px; }
        .asset-row { display: grid; grid-template-columns: 1fr auto auto; align-items: center; gap: 16px; padding: 14px 16px; background: #222222; border-radius: 12px; border: 1px solid #3d3d3d; transition: var(--transition); }
        .asset-row:hover { background: #2a2a2a; border-color: #444; }
        .asset-info { font-size: 13px; font-weight: 500; color: #ccc; }
        .asset-upload-btn { padding: 8px 16px; background: #252528; border: 1px solid var(--border); border-radius: 8px; font-size: 11px; font-weight: 700; cursor: pointer; transition: var(--transition); }
        .asset-upload-btn:hover { border-color: var(--purple); color: var(--purple); }
        .asset-status { font-size: 11px; font-weight: 700; color: var(--green); min-width: 80px; text-align: right; }

        #toast { position: fixed; bottom: -100px; right: 32px; padding: 16px 24px; border-radius: 12px; background: #161618; border: 1px solid var(--border); color: #fff; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 1000; opacity: 0; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        #toast.show { bottom: 32px; opacity: 1; }
        .fade-in { animation: fadeInUp 0.4s ease forwards; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="preloader">
        <div class="loader-logo">FATE<span>.</span>OVERLAYS</div>
    </div>

    <aside>
        <div class="logo">FATE<span>.OVERLAYS</span></div>
        <div class="user-panel">
            <img src="" id="user-avatar" alt="" style="display:none;">
            <div id="avatar-fallback" style="width:36px; height:36px; border-radius:50%; background:var(--purple); display:flex; align-items:center; justify-content:center; font-weight:700;">?</div>
            <div class="user-info">
                <div class="user-name" id="user-name-display">Загрузка...</div>
                <div class="user-status"><span style="width:6px; height:6px; background:var(--green); border-radius:50%;"></span>Доступ активен</div>
            </div>
        </div>
        <div class="nav-label">Оверлеи</div>
        <button class="nav-item active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="5" width="20" height="14" rx="2"/><path d="M2 10h20"/></svg> РОЛЛ</button>
        <div class="nav-label">Аккаунт</div>
        <a href="/" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg> ГЛАВНАЯ</a>
        <div style="margin-top:auto;"><button class="nav-item" style="color:var(--red);" onclick="logout()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg> ВЫЙТИ</button></div>
    </aside>

    <main>
        <div class="page-header fade-in">
            <h1 class="page-title">ДАШБОРД</h1>
        </div>

        <div class="dashboard-grid">
            <!-- Left Column: OBS + Settings -->
            <div class="grid-col fade-in" style="animation-delay: 0.1s;">
                <div class="card">
                    <div class="card-header"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg><div class="card-title">OBS Browser Source</div></div>
                    <div class="obs-box">
                        <div class="obs-url" id="obs-url">Загрузка...</div>
                        <button class="btn btn-icon" onclick="copyUrl()"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg></button>
                        <button class="btn btn-green" onclick="triggerTest(this)">ТЕСТ</button>
                    </div>
                </div>

                <div class="card">
                    <div class="card-header"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42"/></svg><div class="card-title">Настройки</div></div>
                    <form id="settings-form" onsubmit="saveSettings(event)">
                        <div class="input-group" style="margin-bottom: 20px;">
                            <label class="label">Привязка к награде Twitch</label>
                            <div style="display: flex; gap: 10px;">
                                <select name="reward_id" id="reward-select" class="btn" style="flex: 1; background: #222; border: 1px solid #3d3d3d; text-align: left; text-transform: none; font-weight: 500; justify-content: flex-start; padding-left: 16px;">
                                    <option value="">Выберите награду...</option>
                                </select>
                                <button type="button" class="btn btn-icon" onclick="fetchRewards()" title="Обновить список наград">
                                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 4v6h-6M1 20v-6h6M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg>
                                </button>
                            </div>
                            <input type="hidden" name="reward_name" id="reward-name-hidden">
                        </div>
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px;">
                            <div><label class="label">Мин. число</label><input type="number" name="min_val" value="1"></div>
                            <div><label class="label">Макс. число</label><input type="number" name="max_val" value="100"></div>
                        </div>
                        <button type="submit" id="save-btn" class="btn btn-purple" style="width: 100%;">СОХРАНИТЬ НАСТРОЙКИ</button>
                    </form>
                </div>
                    </form>
                </div>
            </div>

            <!-- Right Column: Assets -->
            <div class="grid-col fade-in" style="animation-delay: 0.2s;">
                <div class="card" style="height: 100%; display: flex; flex-direction: column;">
                    <div class="card-header"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg><div class="card-title">Ассеты</div></div>
                    <div class="asset-list" id="asset-list" style="flex: 1; overflow-y: auto; padding-right: 4px;">
                        <div class="asset-row"><div class="asset-info">Фон панели (1600х210)</div><div class="asset-status" id="status-panel_bg"></div><label class="asset-upload-btn">ВЫБРАТЬ<input type="file" hidden onchange="uploadFile(this, 'panel_bg')" accept="image/*"></label></div>
                        <div class="asset-row"><div class="asset-info">Иконка награды (200x200)</div><div class="asset-status" id="status-reward_img"></div><label class="asset-upload-btn">ВЫБРАТЬ<input type="file" hidden onchange="uploadFile(this, 'reward_img')" accept="image/png"></label></div>
                        <div class="asset-row"><div class="asset-info">Звук появления</div><div class="asset-status" id="status-s_in"></div><label class="asset-upload-btn">ВЫБРАТЬ<input type="file" hidden onchange="uploadFile(this, 's_in')" accept="audio/*"></label></div>
                        <div class="asset-row"><div class="asset-info">Звук рандома</div><div class="asset-status" id="status-s_roll"></div><label class="asset-upload-btn">ВЫБРАТЬ<input type="file" hidden onchange="uploadFile(this, 's_roll')" accept="audio/*"></label></div>
                        <div class="asset-row"><div class="asset-info">Звук победы</div><div class="asset-status" id="status-s_win"></div><label class="asset-upload-btn">ВЫБРАТЬ<input type="file" hidden onchange="uploadFile(this, 's_win')" accept="audio/*"></label></div>
                        <div class="asset-row"><div class="asset-info">Звук проигрыша</div><div class="asset-status" id="status-s_lose"></div><label class="asset-upload-btn">ВЫБРАТЬ<input type="file" hidden onchange="uploadFile(this, 's_lose')" accept="audio/*"></label></div>
                        <div class="asset-row"><div class="asset-info">Звук исчезновения</div><div class="asset-status" id="status-s_out"></div><label class="asset-upload-btn">ВЫБРАТЬ<input type="file" hidden onchange="uploadFile(this, 's_out')" accept="audio/*"></label></div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="toast">✅ Настройки сохранены!</div>

    <script>
        let currentUser = null;

        async function init() {
            try {
                const res = await fetch('/api/auth_me');
                if (!res.ok) { window.location.href = '/auth/twitch'; return; }
                currentUser = await res.json();
                document.getElementById('user-name-display').textContent = currentUser.display_name;
                if (currentUser.profile_image_url) {
                    const avatar = document.getElementById('user-avatar');
                    avatar.src = currentUser.profile_image_url; avatar.style.display = 'block';
                    document.getElementById('avatar-fallback').style.display = 'none';
                }
                const obsPath = `${window.location.origin}/overlays/roll?id=${currentUser.id}`;
                document.getElementById('obs-url').textContent = obsPath;
                await loadSettings();
                await loadAssetStatuses();
            } catch (e) { console.error('Init error:', e); }
            finally {
                const pre = document.getElementById('preloader');
                if (pre) { pre.style.opacity = '0'; setTimeout(() => pre.remove(), 400); }
            }
        }

        async function loadSettings() {
            try {
                const res = await fetch(`/api/ov_settings?userId=${currentUser.id}`);
                const settings = await res.json();
                const form = document.getElementById('settings-form');
                
                if (settings.reward_id) {
                    const sel = document.getElementById('reward-select');
                    const opt = document.createElement('option');
                    opt.value = settings.reward_id;
                    opt.textContent = settings.reward_name || 'Привязанная награда';
                    opt.selected = true;
                    sel.appendChild(opt);
                }

                form.min_val.value = settings.min_val || 1;
                form.max_val.value = settings.max_val || 100;
            } catch (e) { }
        }

        async function fetchRewards() {
            const btn = event.currentTarget;
            btn.style.opacity = '0.5';
            try {
                const res = await fetch('/api/ov_rewards');
                const rewards = await res.json();
                if (rewards.error) {
                    showToast(rewards.error, true);
                    return;
                }
                const sel = document.getElementById('reward-select');
                const currentVal = sel.value;
                sel.innerHTML = '<option value="">Выберите награду...</option>';
                rewards.forEach(r => {
                    const opt = document.createElement('option');
                    opt.value = r.id;
                    opt.textContent = r.title + (r.userInputRequired ? '' : ' (БЕЗ ТЕКСТА!)');
                    if (r.id === currentVal) opt.selected = true;
                    sel.appendChild(opt);
                });
                showToast('Список наград обновлен');
            } catch (e) {
                showToast('Ошибка загрузки наград', true);
            } finally {
                btn.style.opacity = '1';
            }
        }

        async function saveSettings(e) {
            e.preventDefault();
            const btn = document.getElementById('save-btn');
            const oldText = 'СОХРАНИТЬ НАСТРОЙКИ';
            btn.classList.add('btn-saving');
            btn.textContent = 'СОХРАНЕНИЕ...';

            const form = e.target;
            const sel = document.getElementById('reward-select');
            const selectedOption = sel.options[sel.selectedIndex];
            
            const settings = {
                reward_id: form.reward_id.value,
                reward_name: selectedOption ? selectedOption.textContent.replace(' (БЕЗ ТЕКСТА!)', '') : '',
                min_val: form.min_val.value,
                max_val: form.max_val.value
            };

            try {
                // 1. Save settings
                const res = await fetch('/api/ov_settings', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(settings)
                });
                
                if (res.ok) {
                    // 2. Refresh Twitch Connection (EventSub)
                    await fetch('/api/ov_subscribe', { method: 'POST' }).catch(() => {});
                    
                    btn.classList.remove('btn-saving');
                    btn.classList.add('btn-success');
                    btn.textContent = 'СОХРАНЕНО!';
                    showToast('Настройки сохранены и связь обновлена');
                    setTimeout(() => {
                        btn.classList.remove('btn-success');
                        btn.textContent = oldText;
                    }, 2000);
                } else throw new Error();
            } catch (e) {
                btn.classList.remove('btn-saving');
                btn.textContent = 'ОШИБКА! ❌';
                showToast('Ошибка сохранения', true);
                setTimeout(() => {
                    btn.textContent = oldText;
                }, 2000);
            }
        }

        async function uploadFile(input, key) {
            const file = input.files[0]; if (!file) return;
            const statusEl = document.getElementById(`status-${key}`);
            statusEl.textContent = '...';
            const reader = new FileReader();
            reader.onload = async () => {
                try {
                    const res = await fetch('/api/ov_upload', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ asset: reader.result, key })
                    });
                    if (res.ok) {
                        statusEl.textContent = '✓ Загружено'; statusEl.className = 'asset-status status-ok';
                    }
                } catch (e) {}
            };
            reader.readAsDataURL(file);
        }

        async function loadAssetStatuses() {
            try {
                const res = await fetch(`/api/ov_upload?userId=${currentUser.id}`);
                const assets = await res.json();
                Object.keys(assets).forEach(key => {
                    const status = document.getElementById(`status-${key}`);
                    if (status) { status.textContent = '✓ Загружено'; status.className = 'asset-status status-ok'; }
                });
            } catch (e) {}
        }

        async function triggerTest(btn) {
            const form = document.getElementById('settings-form');
            const minV = parseInt(form.min_val.value) || 1;
            const maxV = parseInt(form.max_val.value) || 100;
            const choice = Math.floor(Math.random() * (maxV - minV + 1)) + minV;
            const userName = document.getElementById('user-name-display').textContent;
            const avatarImg = document.getElementById('user-avatar');
            const userAvatar = avatarImg.style.display !== 'none' ? avatarImg.src : '';

            let obsPath = document.getElementById('obs-url').textContent;
            if (!obsPath.includes('.html')) {
                obsPath = obsPath.replace('/overlays/roll', '/overlays/roll.html');
            }
            
            // Add params directly to the URL for instant trigger
            const testUrl = new URL(obsPath);
            testUrl.searchParams.set('test', '1');
            testUrl.searchParams.set('userName', userName);
            testUrl.searchParams.set('userChoice', choice);
            if (userAvatar) testUrl.searchParams.set('userAvatar', userAvatar);

            window.open(testUrl.toString(), 'FatePreview', 'width=1620,height=310,menubar=no,toolbar=no,location=no,status=no');
            showToast('Тест запущен!');
            
            // Still call API to trigger existing OBS sources if any
            fetch('/api/ov_test', { method: 'POST' }).catch(() => {});
        }

        function copyUrl() {
            const url = document.getElementById('obs-url').textContent;
            navigator.clipboard.writeText(url).then(() => showToast('URL скопирован'));
        }

        function logout() {
            fetch('/api/auth_logout', { method: 'POST' }).then(() => window.location.href = '/');
        }

        function showToast(msg, error = false) {
            const t = document.getElementById('toast'); if (!t) return;
            t.textContent = msg; 
            t.style.borderColor = error ? 'var(--red)' : 'var(--green)';
            t.style.color = error ? '#fff' : '#fff'; // White text is better on dark bg
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        init();
    </script>
</body>
</html>
