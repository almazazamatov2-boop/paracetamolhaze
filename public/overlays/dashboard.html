<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fate Overlays — Дашборд</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Bebas+Neue&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #080808;
            --sidebar: #111111;
            --card: #111111;
            --border: #1e1e1e;
            --text: #e8e8e8;
            --text-muted: #818181;
            --purple: #7c3aed;
            --green: #22c55e;
            --red: #ef4444;
            --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            overflow-x: hidden;
        }

        #preloader {
            position: fixed; inset: 0; background: var(--bg);
            display: flex; align-items: center; justify-content: center;
            z-index: 1000; transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .loader-logo {
            font-family: 'Bebas Neue', sans-serif; font-size: 48px; letter-spacing: 5px; color: var(--text);
            animation: pulse 1.5s infinite ease-in-out;
        }
        .loader-logo span { color: var(--purple); }
        @keyframes pulse { 0%, 100% { opacity: 0.3; transform: scale(0.95); } 50% { opacity: 1; transform: scale(1); } }

        aside {
            width: 240px; background: var(--sidebar); border-right: 1px solid var(--border);
            padding: 24px 20px; display: flex; flex-direction: column;
            position: fixed; top: 0; left: 0; bottom: 0; z-index: 100;
        }

        .logo { font-family: 'Bebas Neue', sans-serif; font-size: 24px; letter-spacing: 3px; margin-bottom: 32px; color: var(--text); }
        .logo span { color: var(--purple); }

        .user-panel {
            display: flex; align-items: center; gap: 12px; padding: 14px;
            background: #1a1a1a; border-radius: 12px; margin-bottom: 32px; transition: var(--transition);
        }

        #user-avatar { width: 36px; height: 36px; border-radius: 50%; background: var(--purple); object-fit: cover; }
        .user-name { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .user-status { font-size: 11px; color: var(--green); display: flex; align-items: center; gap: 4px; }

        .nav-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; color: var(--text-muted); margin: 24px 0 12px 0; }
        .nav-item {
            display: flex; align-items: center; gap: 12px; padding: 12px 14px; border-radius: 10px;
            font-size: 14px; font-weight: 500; color: var(--text); text-decoration: none;
            transition: var(--transition); border: none; background: none; cursor: pointer; width: 100%;
        }
        .nav-item:hover { background: rgba(255,255,255,0.05); }
        .nav-item.active { background: rgba(124, 58, 237, 0.1); color: #a855f7; }
        .nav-item svg { width: 18px; color: currentColor; }

        main { flex: 1; margin-left: 240px; padding: 40px 60px; max-width: 1600px; width: calc(100% - 240px); }
        .page-title { font-family: 'Bebas Neue', sans-serif; font-size: 42px; letter-spacing: 1px; margin-bottom: 32px; }

        .card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 28px; margin-bottom: 24px; }
        .card-header { display: flex; align-items: center; gap: 12px; margin-bottom: 24px; }
        .card-header svg { color: var(--purple); width: 22px; }
        .card-title { font-size: 18px; font-weight: 700; }

        .label { display: block; font-size: 13px; font-weight: 600; color: var(--text-muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
        input[type="text"], input[type="number"] {
            width: 100%; background: #1a1a1a; border: 1px solid var(--border); border-radius: 10px;
            padding: 12px 16px; color: var(--text); font-size: 14px; outline: none; transition: border-color 0.2s;
        }
        input:focus { border-color: var(--purple); }

        .obs-box { display: flex; gap: 12px; background: #1a1a1a; padding: 8px; border-radius: 12px; border: 1px solid var(--border); }
        .obs-url { flex: 1; padding: 8px 12px; font-family: monospace; font-size: 13px; color: #a855f7; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        .btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; padding: 12px 24px; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; transition: var(--transition); border: none; color: #fff; }
        .btn-purple { background: var(--purple); }
        .btn-green { background: var(--green); }
        .btn-icon { padding: 8px 12px; background: rgba(255,255,255,0.05); }

        .asset-list { display: grid; gap: 12px; }
        .asset-row { display: flex; align-items: center; gap: 16px; padding: 16px; background: rgba(255,255,255,0.02); border-radius: 12px; border: 1px solid var(--border); }
        .asset-info { flex: 1; }
        .asset-name { font-size: 14px; font-weight: 500; }
        .asset-ext { font-size: 12px; color: var(--text-muted); }
        .asset-upload-btn { padding: 8px 16px; background: #252528; border: 1px solid var(--border); border-radius: 8px; font-size: 12px; font-weight: 600; color: var(--text); cursor: pointer; }
        .asset-status { font-size: 13px; font-weight: 600; }
        .status-ok { color: var(--green); }
        .status-err { color: var(--red); }

        #toast { position: fixed; bottom: 32px; right: 32px; padding: 16px 24px; border-radius: 12px; background: #161618; border: 1px solid var(--border); color: #fff; font-weight: 500; transform: translateY(150%); transition: transform 0.3s; z-index: 1000; }
        #toast.show { transform: translateY(0); }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .fade-in { animation: fadeInUp 0.4s ease forwards; }
    </style>
</head>
<body>

    <div id="preloader">
        <div class="loader-logo">FATE<span>.</span>OVERLAYS</div>
    </div>

    <aside>
        <div class="logo">FATE<span>.OVERLAYS</span></div>
        <div class="user-panel">
            <img src="" id="user-avatar" alt="" style="display:none;">
            <div id="avatar-fallback" style="width:36px; height:36px; border-radius:50%; background:var(--purple); display:flex; align-items:center; justify-content:center; font-weight:700;">?</div>
            <div class="user-info">
                <div class="user-name" id="user-name-display">Загрузка...</div>
                <div class="user-status"><span style="width:6px; height:6px; background:var(--green); border-radius:50%;"></span>Доступ активен</div>
            </div>
        </div>
        <div class="nav-label">Оверлеи</div>
        <button class="nav-item active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="5" width="20" height="14" rx="2"/><path d="M2 10h20"/></svg> РОЛЛ</button>
        <div class="nav-label">Аккаунт</div>
        <a href="/" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg> ГЛАВНАЯ</a>
        <div style="margin-top:auto;"><button class="nav-item" style="color:var(--red);" onclick="logout()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg> ВЫЙТИ</button></div>
    </aside>

    <main>
        <h1 class="page-title fade-in">ДАШБОРД</h1>
        <div class="card fade-in" style="animation-delay: 0.1s;">
            <div class="card-header"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg><div class="card-title">OBS Browser Source</div></div>
            <div class="obs-box">
                <div class="obs-url" id="obs-url">Загрузка...</div>
                <button class="btn btn-icon" onclick="copyUrl()"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg></button>
                <button class="btn btn-green" onclick="triggerTest(this)">ТЕСТ</button>
            </div>
        </div>

        <div class="card fade-in" style="animation-delay: 0.2s;">
            <div class="card-header"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42"/></svg><div class="card-title">Настройки</div></div>
            <form id="settings-form" onsubmit="saveSettings(event)">
                <div class="input-group"><label class="label">Название награды в Twitch</label><input type="text" name="reward_name" placeholder="РАНДОМ СКИН КС2"></div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px;">
                    <div><label class="label">Мин. число</label><input type="number" name="min_val" value="1"></div>
                    <div><label class="label">Макс. число</label><input type="number" name="max_val" value="100"></div>
                </div>
                <button type="submit" class="btn btn-purple" style="width: 100%;">СОХРАНИТЬ НАСТРОЙКИ</button>
            </form>
        </div>

        <div class="card fade-in" style="animation-delay: 0.3s;">
            <div class="card-header"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg><div class="card-title">Ассеты</div></div>
            <div class="asset-list" id="asset-list">
                <div class="asset-row"><div class="asset-info"><div class="asset-name">Фон панели (1600х210)</div></div><div class="asset-status" id="status-panel_bg"></div><label class="asset-upload-btn">ВЫБРАТЬ<input type="file" hidden onchange="uploadFile(this, 'panel_bg')" accept="image/*"></label></div>
                <div class="asset-row"><div class="asset-info"><div class="asset-name">Иконка награды (200x200)</div></div><div class="asset-status" id="status-reward_img"></div><label class="asset-upload-btn">ВЫБРАТЬ<input type="file" hidden onchange="uploadFile(this, 'reward_img')" accept="image/png"></label></div>
                <div class="asset-row"><div class="asset-info"><div class="asset-name">Звук появления</div></div><div class="asset-status" id="status-s_in"></div><label class="asset-upload-btn">ВЫБРАТЬ<input type="file" hidden onchange="uploadFile(this, 's_in')" accept="audio/*"></label></div>
                <div class="asset-row"><div class="asset-info"><div class="asset-name">Звук рандома</div></div><div class="asset-status" id="status-s_roll"></div><label class="asset-upload-btn">ВЫБРАТЬ<input type="file" hidden onchange="uploadFile(this, 's_roll')" accept="audio/*"></label></div>
                <div class="asset-row"><div class="asset-info"><div class="asset-name">Звук победы</div></div><div class="asset-status" id="status-s_win"></div><label class="asset-upload-btn">ВЫБРАТЬ<input type="file" hidden onchange="uploadFile(this, 's_win')" accept="audio/*"></label></div>
                <div class="asset-row"><div class="asset-info"><div class="asset-name">Звук проигрыша</div></div><div class="asset-status" id="status-s_lose"></div><label class="asset-upload-btn">ВЫБРАТЬ<input type="file" hidden onchange="uploadFile(this, 's_lose')" accept="audio/*"></label></div>
                <div class="asset-row"><div class="asset-info"><div class="asset-name">Звук исчезновения</div></div><div class="asset-status" id="status-s_out"></div><label class="asset-upload-btn">ВЫБРАТЬ<input type="file" hidden onchange="uploadFile(this, 's_out')" accept="audio/*"></label></div>
            </div>
        </div>
    </main>

    <div id="toast">✅ Настройки сохранены!</div>

    <script>
        let currentUser = null;

        async function init() {
            try {
                const res = await fetch('/api/auth_me');
                if (!res.ok) { window.location.href = '/auth/twitch'; return; }
                currentUser = await res.json();
                document.getElementById('user-name-display').textContent = currentUser.display_name;
                if (currentUser.profile_image_url) {
                    const avatar = document.getElementById('user-avatar');
                    avatar.src = currentUser.profile_image_url; avatar.style.display = 'block';
                    document.getElementById('avatar-fallback').style.display = 'none';
                }
                const obsPath = `${window.location.origin}/overlays/roll?id=${currentUser.id}`;
                document.getElementById('obs-url').textContent = obsPath;
                await loadSettings();
                await loadAssetStatuses();
            } catch (e) { console.error('Init error:', e); }
            finally {
                const pre = document.getElementById('preloader');
                if (pre) { pre.style.opacity = '0'; setTimeout(() => pre.remove(), 400); }
            }
        }

        async function loadSettings() {
            try {
                const res = await fetch(`/api/ov_settings?userId=${currentUser.id}`);
                const s = await res.json();
                const form = document.getElementById('settings-form');
                form.reward_name.value = s.reward_name || '';
                form.min_val.value = s.min_val || 1;
                form.max_val.value = s.max_val || 100;
            } catch (e) {}
        }

        async function saveSettings(e) {
            e.preventDefault();
            const form = e.target;
            const data = {
                reward_name: form.reward_name.value,
                min_val: form.min_val.value,
                max_val: form.max_val.value,
                color_bg: '#000000',
                color_name: '#FFFFFF',
                color_num: '#FFFFFF',
            };
            try {
                const res = await fetch('/api/ov_settings', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(data)
                });
                if (res.ok) showToast('Настройки сохранены');
                else throw new Error();
            } catch (e) { showToast('Ошибка сохранения', true); }
        }

        async function uploadFile(input, key) {
            const file = input.files[0]; if (!file) return;
            const statusEl = document.getElementById(`status-${key}`);
            statusEl.textContent = '...'; statusEl.className = 'asset-status';
            const reader = new FileReader();
            reader.onload = async () => {
                try {
                    const res = await fetch('/api/ov_upload', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ asset: reader.result, key })
                    });
                    if (res.ok) {
                        statusEl.textContent = '✓ Загружено'; statusEl.className = 'asset-status status-ok';
                        showToast('Файл успешно загружен');
                    } else throw new Error();
                } catch (e) {
                    statusEl.textContent = '✗ Ошибка'; statusEl.className = 'asset-status status-err';
                    showToast('Ошибка загрузки файла', true);
                }
            };
            reader.readAsDataURL(file);
        }

        async function loadAssetStatuses() {
            try {
                const res = await fetch(`/api/ov_upload?userId=${currentUser.id}`);
                const assets = await res.json();
                Object.keys(assets).forEach(key => {
                    const status = document.getElementById(`status-${key}`);
                    if (status) { status.textContent = '✓ Загружено'; status.className = 'asset-status status-ok'; }
                });
            } catch (e) {}
        }

        async function triggerTest(btn) {
            const oldText = btn.textContent; btn.textContent = '...'; btn.disabled = true;
            try {
                const res = await fetch('/api/ov_test', { method: 'POST' });
                if (res.ok) {
                    const url = document.getElementById('obs-url').textContent;
                    window.open(url, 'testOverlay', 'width=1620,height=290');
                    showToast('Тест запущен!');
                } else throw new Error();
            } catch (e) { showToast('Ошибка запуска теста', true); }
            finally { btn.textContent = oldText; btn.disabled = false; }
        }

        function copyUrl() {
            const url = document.getElementById('obs-url').textContent;
            navigator.clipboard.writeText(url).then(() => showToast('URL скопирован'));
        }

        function logout() {
            fetch('/api/auth_logout', { method: 'POST' }).then(() => window.location.href = '/');
        }

        function showToast(msg, error = false) {
            const t = document.getElementById('toast'); if (!t) return;
            t.textContent = msg; t.style.borderColor = error ? 'var(--red)' : 'var(--green)';
            t.style.color = error ? 'var(--red)' : 'var(--green)'; t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        init();
    </script>
</body>
</html>
