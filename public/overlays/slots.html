<!DOCTYPE html>
<html>
<head>
    <title>Slots Overlay</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tween.js/18.6.4/tween.umd.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: transparent; font-family: 'Outfit', sans-serif; }
        
        #machine-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 800px;
            height: 450px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #machine-frame {
            position: absolute;
            width: 100%;
            height: 100%;
            background: url('gold_machine.png') no-repeat center;
            background-size: cover;
            pointer-events: none;
            z-index: 10;
        }

        .reels-container {
            display: flex;
            gap: 15px;
            padding-bottom: 30px;
            z-index: 5;
            padding-right: 35px; /* Alignment for the offset of the handle in the frame */
        }

        .reel-window {
            width: 140px;
            height: 180px;
            background: #fff;
            border-radius: 8px;
            overflow: hidden;
            position: relative;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
        }

        .reel-strip {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            display: flex;
            flex-direction: column;
        }

        .symbol {
            width: 140px;
            height: 180px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .symbol img {
            width: 100px;
            height: 100px;
            object-fit: contain;
        }

        #lever-stick {
            position: absolute;
            right: 40px;
            top: 100px;
            width: 15px;
            height: 120px;
            background: linear-gradient(90deg, #888, #ddd, #888);
            border-radius: 10px;
            transform-origin: bottom center;
            z-index: 5;
            transition: transform 0.3s ease;
        }

        #lever-ball {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 40px;
            height: 40px;
            background: radial-gradient(circle at 30% 30%, #ff4d4d, #8b0000);
            border-radius: 50%;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        #status-text {
            position: absolute;
            bottom: 40px;
            width: 100%;
            text-align: center;
            color: #ffd700;
            font-size: 32px;
            text-shadow: 0 4px 10px rgba(0,0,0,1);
            z-index: 20;
            opacity: 0;
            transition: opacity 0.3s;
        }
        
        /* Animation Classes */
        .pulling { transform: rotateX(60deg) scaleY(0.5); }
    </style>
</head>
<body>
    <div id="machine-container">
        <div id="machine-frame"></div>
        
        <div class="reels-container">
            <div class="reel-window"><div class="reel-strip" id="reel-0"></div></div>
            <div class="reel-window"><div class="reel-strip" id="reel-1"></div></div>
            <div class="reel-window"><div class="reel-strip" id="reel-2"></div></div>
        </div>

        <div id="lever-stick"><div id="lever-ball"></div></div>
        <div id="status-text">WINNER!</div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const streamerId = params.get('id');
        let config = { symbols: [], assets: {} };
        let isSpinning = false;

        const sounds = {
            lever: new Audio(),
            spin: new Audio(),
            win: new Audio(),
            jackpot: new Audio(),
            lose: new Audio()
        };

        const defaultIcons = [
            'https://img.icons8.com/color/96/apple.png',
            'https://img.icons8.com/color/96/lemon.png',
            'https://img.icons8.com/color/96/cherry.png',
            'https://img.icons8.com/color/96/jingle-bell.png',
            'https://img.icons8.com/color/96/7-ball.png'
        ];

        async function init() {
            if (!streamerId) return;
            const res = await fetch(`/api/ov_settings?userId=${streamerId}&type=slots`);
            const data = await res.json();
            config = data;

            const assets = config.assets || {};
            sounds.lever.src = assets.s_lever || 'https://assets.mixkit.co/active_storage/sfx/2042/2042-preview.mp3';
            sounds.spin.src = assets.s_spin || 'https://assets.mixkit.co/active_storage/sfx/2012/2012-preview.mp3';
            sounds.win.src = assets.s_win || 'https://assets.mixkit.co/active_storage/sfx/2017/2017-preview.mp3';
            sounds.jackpot.src = assets.s_jackpot || 'https://assets.mixkit.co/active_storage/sfx/2019/2019-preview.mp3';
            sounds.lose.src = assets.s_lose || 'https://assets.mixkit.co/active_storage/sfx/2004/2004-preview.mp3';

            buildReels();
            animate();
            setInterval(checkTrigger, 2000);
        }

        function buildReels(targetUrls = null) {
            const symbols = config.symbols && config.symbols.length >= 5 ? config.symbols : defaultIcons.map(url => ({url}));
            
            for (let i = 0; i < 3; i++) {
                const strip = document.getElementById(`reel-${i}`);
                strip.innerHTML = '';
                
                // Create a strip with many symbols for scrolling
                // We need at least symbols for the "rest" state and many for the "spin"
                const list = [];
                // Fill with 30 symbols for the spin effect
                for(let j=0; j<40; j++) {
                    const sym = symbols[j % symbols.length];
                    list.push(sym.url);
                }
                
                // If we have a target, make sure the last few symbols lead to it
                if (targetUrls) {
                    list[list.length - 1] = targetUrls[i];
                }

                list.forEach(url => {
                    const div = document.createElement('div');
                    div.className = 'symbol';
                    div.innerHTML = `<img src="${url}">`;
                    strip.appendChild(div);
                });
                
                // Reset position to bottom (initial)
                strip.style.top = `-${(list.length - 1) * 180}px`;
            }
        }

        function pullLever(callback) {
            sounds.lever.play();
            const stick = document.getElementById('lever-stick');
            stick.style.transform = 'rotateX(60deg) scaleY(0.5)';
            setTimeout(() => {
                stick.style.transform = 'rotateX(0deg) scaleY(1)';
                callback();
            }, 500);
        }

        function spin(payload) {
            if (isSpinning) return;
            isSpinning = true;
            document.getElementById('status-text').style.opacity = '0';
            
            // Rebuild reels with target result at the end
            buildReels(payload.result);
            
            sounds.spin.currentTime = 0;
            sounds.spin.play();

            for (let i = 0; i < 3; i++) {
                const strip = document.getElementById(`reel-${i}`);
                const startTime = Date.now();
                const duration = 3000 + i * 800;
                
                new TWEEN.Tween({ y: parseInt(strip.style.top) })
                    .to({ y: 0 }, duration)
                    .easing(TWEEN.Easing.Quadratic.InOut)
                    .onUpdate((obj) => {
                        strip.style.top = `${obj.y}px`;
                    })
                    .onComplete(() => {
                        if (i === 2) finalize(payload);
                    })
                    .start();
            }
        }

        function finalize(payload) {
            isSpinning = false;
            sounds.spin.pause();
            
            const status = document.getElementById('status-text');
            if (payload.isWin) {
                if (payload.isJackpot) {
                    sounds.jackpot.play();
                    status.innerText = "JACKPOT!";
                } else {
                    sounds.win.play();
                    status.innerText = "WINNER!";
                }
                status.style.opacity = '1';
                status.style.color = '#ffd700';
            } else {
                sounds.lose.play();
                status.innerText = "TRY AGAIN";
                status.style.opacity = '1';
                status.style.color = '#fff';
            }
            
            // Auto hide after 5s
            setTimeout(() => {
                status.style.opacity = '0';
                // Reset reels for next time? 
                // We keep them at top: 0, which shows the result symbol.
            }, 5000);
        }

        let lastTriggerId = null;
        async function checkTrigger() {
            if (!streamerId || isSpinning) return;
            try {
                const res = await fetch(`/api/ov_trigger?userId=${streamerId}&type=slots`);
                const data = await res.json();
                if (data.triggerId && data.triggerId !== lastTriggerId) {
                    lastTriggerId = data.triggerId;
                    pullLever(() => spin(data));
                }
            } catch (e) {}
        }

        function animate(time) {
            requestAnimationFrame(animate);
            TWEEN.update(time);
        }

        init();
    </script>
</body>
</html>
