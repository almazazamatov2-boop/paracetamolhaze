<!DOCTYPE html>
<html>
<head>
    <title>Slots Overlay</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@800&display=swap');
        
        body { margin: 0; overflow: hidden; background: transparent; font-family: 'Outfit', sans-serif; }
        
        #machine-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 800px;
            height: 600px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* The machine frame image you provided */
        #machine-frame {
            position: absolute;
            width: 700px;
            height: 500px;
            background: url('https://i.ibb.co/vz19777/slots-frame.png') no-repeat center;
            background-size: contain;
            pointer-events: none;
            z-index: 10;
        }

        .reels-wrapper {
            position: absolute;
            top: 198px; /* Precise alignment to match frame windows */
            left: 174px;
            display: flex;
            gap: 12px;
            z-index: 5;
        }

        .reel-window {
            width: 142px;
            height: 190px;
            background: #fff;
            overflow: hidden;
            position: relative;
            box-shadow: inset 0 0 30px rgba(0,0,0,0.8);
            border-radius: 4px;
        }

        .reel-strip {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            transition: top 3s cubic-bezier(0.45, 0.05, 0.55, 0.95);
        }

        .symbol {
            width: 142px;
            height: 190px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .symbol img {
            width: 110px;
            height: 110px;
            object-fit: contain;
        }

        #lever-container {
            position: absolute;
            right: 0;
            top: 150px;
            width: 100px;
            height: 300px;
            z-index: 11;
        }

        #lever-stick {
            position: absolute;
            top: 100px;
            left: 30px;
            width: 12px;
            height: 140px;
            background: linear-gradient(to right, #666, #eee, #666);
            border-radius: 6px;
            transform-origin: bottom center;
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #lever-ball {
            position: absolute;
            top: -25px;
            left: -14px;
            width: 40px;
            height: 40px;
            background: radial-gradient(circle at 30% 30%, #ff4b2b, #9e0e0e);
            border-radius: 50%;
            box-shadow: 0 4px 8px rgba(0,0,0,0.4);
        }

        #win-label {
            position: absolute;
            top: 40px;
            width: 100%;
            text-align: center;
            color: #ffcc00;
            font-size: 60px;
            font-weight: 800;
            text-transform: uppercase;
            text-shadow: 0 0 20px #ff0000, 0 0 40px #ff0000;
            z-index: 20;
            opacity: 0;
            transition: 0.5s;
            transform: scale(0.5);
        }

        .win-active { opacity: 1 !important; transform: scale(1.1) !important; }
    </style>
</head>
<body>
    <div id="machine-container">
        <h1 id="win-label">WINNER!</h1>
        <div id="machine-frame"></div>
        
        <div class="reels-wrapper">
            <div class="reel-window"><div class="reel-strip" id="reel-0"></div></div>
            <div class="reel-window"><div class="reel-strip" id="reel-1"></div></div>
            <div class="reel-window"><div class="reel-strip" id="reel-2"></div></div>
        </div>

        <div id="lever-container">
            <div id="lever-stick"><div id="lever-ball"></div></div>
        </div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const streamerId = params.get('id');
        let config = { symbols: [], assets: {} };
        let isSpinning = false;

        const defaultIcons = [
            'https://img.icons8.com/color/96/apple.png',
            'https://img.icons8.com/color/96/lemon.png',
            'https://img.icons8.com/color/96/cherry.png',
            'https://img.icons8.com/color/96/jingle-bell.png',
            'https://img.icons8.com/color/96/7-ball.png'
        ];

        const sounds = {
            lever: new Audio(),
            spin: new Audio(),
            win: new Audio(),
            jackpot: new Audio(),
            lose: new Audio()
        };

        async function init() {
            if (!streamerId) return;
            try {
                const res = await fetch(`/api/ov_settings?userId=${streamerId}&type=slots`);
                const data = await res.json();
                config = data;

                const assets = config.assets || {};
                sounds.lever.src = assets.s_lever || 'https://assets.mixkit.co/active_storage/sfx/2042/2042-preview.mp3';
                sounds.spin.src = assets.s_spin || 'https://assets.mixkit.co/active_storage/sfx/2012/2012-preview.mp3';
                sounds.win.src = assets.s_win || 'https://assets.mixkit.co/active_storage/sfx/2017/2017-preview.mp3';
                sounds.jackpot.src = assets.s_jackpot || 'https://assets.mixkit.co/active_storage/sfx/2019/2019-preview.mp3';
                sounds.lose.src = assets.s_lose || 'https://assets.mixkit.co/active_storage/sfx/2004/2004-preview.mp3';

                setupReels();
                setInterval(checkTrigger, 2000);
            } catch(e) {}
        }

        function setupReels(results = null) {
            const symbols = (config.symbols && config.symbols.length >= 5) ? config.symbols : defaultIcons.map(url => ({url}));
            
            for (let i = 0; i < 3; i++) {
                const strip = document.getElementById(`reel-${i}`);
                strip.style.transition = 'none';
                strip.style.top = '0px';
                strip.innerHTML = '';

                // We create a very long strip for the spin effect
                // Final result will be at the very bottom
                const count = 40; 
                for (let j = 0; j < count; j++) {
                    const sym = symbols[j % symbols.length];
                    const div = document.createElement('div');
                    div.className = 'symbol';
                    // The very last symbol in the strip is our target result
                    const imgUrl = (j === count - 1 && results) ? results[i] : sym.url;
                    div.innerHTML = `<img src="${imgUrl}">`;
                    strip.insertBefore(div, strip.firstChild);
                }
                
                // Position it so the first symbol is visible
                strip.style.top = `-${(count - 1) * 190}px`;
            }
        }

        function pullLever() {
            sounds.lever.play();
            const stick = document.getElementById('lever-stick');
            stick.style.transform = 'rotateX(80deg)';
            setTimeout(() => {
                stick.style.transform = 'rotateX(0deg)';
            }, 600);
        }

        async function startSpin(payload) {
            if (isSpinning) return;
            isSpinning = true;
            document.getElementById('win-label').classList.remove('win-active');

            // Reset reels with new target
            setupReels(payload.result);

            setTimeout(() => {
                sounds.spin.currentTime = 0;
                sounds.spin.play();

                for (let i = 0; i < 3; i++) {
                    const strip = document.getElementById(`reel-${i}`);
                    strip.style.transition = `top ${2.5 + i * 0.5}s cubic-bezier(0.45, 0.05, 0.55, 0.95)`;
                    strip.style.top = '0px';
                }

                setTimeout(() => finalize(payload), 4000);
            }, 100);
        }

        function finalize(payload) {
            isSpinning = false;
            const label = document.getElementById('win-label');
            
            if (payload.isWin) {
                if (payload.isJackpot) {
                    sounds.jackpot.play();
                    label.innerText = "JACKPOT!";
                } else {
                    sounds.win.play();
                    label.innerText = "BIG WIN!";
                }
                label.classList.add('win-active');
            } else {
                sounds.lose.play();
            }

            setTimeout(() => {
                label.classList.remove('win-active');
            }, 6000);
        }

        let lastTriggerId = null;
        async function checkTrigger() {
            if (!streamerId || isSpinning) return;
            try {
                const res = await fetch(`/api/ov_trigger?userId=${streamerId}&type=slots`);
                const data = await res.json();
                if (data.triggerId && data.triggerId !== lastTriggerId) {
                    lastTriggerId = data.triggerId;
                    pullLever();
                    setTimeout(() => startSpin(data), 600);
                }
            } catch (e) {}
        }

        init();
    </script>
</body>
</html>
