<!DOCTYPE html>
<html>
<head>
    <title>3D Slots Overlay</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tween.js/18.6.4/tween.umd.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: transparent; font-family: 'Inter', sans-serif; }
        #container { width: 100vw; height: 100vh; }
        #status { position: absolute; top: 10px; left: 10px; color: white; background: rgba(0,0,0,0.5); padding: 5px; font-size: 10px; pointer-events: none; }
    </style>
</head>
<body>
    <div id="container"></div>
    <div id="status">Ready</div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const streamerId = params.get('id');
        let config = {};
        let isSpinning = false;
        
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('container').appendChild(renderer.domElement);

        // Lights
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
        scene.add(ambientLight);
        const pointLight = new THREE.PointLight(0xffffff, 1);
        pointLight.position.set(5, 5, 5);
        scene.add(pointLight);

        // Slot Machine Body
        const bodyGeom = new THREE.BoxGeometry(4.5, 3.5, 0.8);
        const bodyMat = new THREE.MeshPhongMaterial({ color: 0x1a1a1a, shininess: 100 });
        const body = new THREE.Mesh(bodyGeom, bodyMat);
        scene.add(body);

        // Handle (Lever)
        const leverGroup = new THREE.Group();
        leverGroup.position.set(2.4, -0.5, 0);
        scene.add(leverGroup);

        const baseGeom = new THREE.CylinderGeometry(0.1, 0.1, 0.4, 16);
        const baseMat = new THREE.MeshPhongMaterial({ color: 0x444444 });
        const base = new THREE.Mesh(baseGeom, baseMat);
        base.rotation.z = Math.PI / 2;
        leverGroup.add(base);

        const stickGeom = new THREE.CylinderGeometry(0.05, 0.05, 1.2, 16);
        const stickMat = new THREE.MeshPhongMaterial({ color: 0x888888 });
        const stick = new THREE.Mesh(stickGeom, stickMat);
        stick.position.y = 0.6;
        leverGroup.add(stick);

        const knobGeom = new THREE.SphereGeometry(0.2, 16, 16);
        const knobMat = new THREE.MeshPhongMaterial({ color: 0xff0000 });
        const knob = new THREE.Mesh(knobGeom, knobMat);
        knob.position.y = 1.2;
        leverGroup.add(knob);

        // Reels
        const reels = [];
        const reelCount = 3;
        const reelGeometry = new THREE.CylinderGeometry(0.9, 0.9, 1, 32);
        
        for (let i = 0; i < reelCount; i++) {
            const reel = new THREE.Group();
            reel.position.x = (i - 1) * 1.3;
            
            const drum = new THREE.Mesh(reelGeometry, new THREE.MeshPhongMaterial({ color: 0xffffff }));
            drum.rotation.z = Math.PI / 2;
            reel.add(drum);
            
            scene.add(reel);
            reels.push({ group: reel, drum: drum });
        }

        camera.position.z = 6;
        camera.position.y = 0.5;

        // Sounds
        let soundLever = new Audio();
        let soundSpin = new Audio();
        let soundWin = new Audio();
        let soundJackpot = new Audio();
        let soundLose = new Audio();

        async function loadConfig() {
            if (!streamerId) return;
            const res = await fetch(`/api/ov_settings?userId=${streamerId}&type=slots`);
            const data = await res.json();
            config = data;

            if (config.s_lever) soundLever.src = config.s_lever;
            if (config.s_spin) soundSpin.src = config.s_spin;
            if (config.s_win) soundWin.src = config.s_win;
            if (config.s_jackpot) soundJackpot.src = config.s_jackpot;
            if (config.s_lose) soundLose.src = config.s_lose;
            
            updateReelSymbols(['','','']); // Initial state with placeholder reel textures if needed
        }

        const textureLoader = new THREE.TextureLoader();
        function updateReelSymbols(urls) {
            reels.forEach((r, i) => {
                const url = urls[i] || '/overlays/defaults/slots/cherry.png';
                textureLoader.load(url, (tex) => {
                    r.drum.material = new THREE.MeshPhongMaterial({ map: tex });
                });
            });
        }

        function pullLever(callback) {
            if (soundLever.src) soundLever.play();
            new TWEEN.Tween(leverGroup.rotation)
                .to({ z: -Math.PI / 3 }, 300)
                .easing(TWEEN.Easing.Quadratic.Out)
                .chain(
                    new TWEEN.Tween(leverGroup.rotation)
                        .to({ z: 0 }, 500)
                        .easing(TWEEN.Easing.Bounce.Out)
                        .onComplete(callback)
                )
                .start();
        }

        function spinReels(payload) {
            isSpinning = true;
            if (soundSpin.src) {
                soundSpin.currentTime = 0;
                soundSpin.play();
            }

            reels.forEach((r, i) => {
                const targetRot = Math.PI * 8 + (i * Math.PI * 2);
                new TWEEN.Tween(r.group.rotation)
                    .to({ x: targetRot }, 2500 + i * 500)
                    .easing(TWEEN.Easing.Quadratic.InOut)
                    .onComplete(() => {
                        if (i === 2) finalizeSpin(payload);
                    })
                    .start();
            });
        }

        function finalizeSpin(payload) {
            isSpinning = false;
            updateReelSymbols(payload.result);
            
            setTimeout(() => {
                if (payload.isWin) {
                    if (payload.isJackpot) {
                        if (soundJackpot.src) soundJackpot.play();
                        document.getElementById('status').innerText = "JACKPOT!";
                    } else {
                        if (soundWin.src) soundWin.play();
                        document.getElementById('status').innerText = "WIN!";
                    }
                    showWinAnimation();
                } else {
                    if (soundLose.src) soundLose.play();
                    document.getElementById('status').innerText = "Try Again";
                }
            }, 500);
        }

        function showWinAnimation() {
            new TWEEN.Tween(body.scale)
                .to({ x: 1.1, y: 1.1 }, 200)
                .yoyo(true)
                .repeat(5)
                .start();
        }

        let lastTriggerId = null;
        async function checkTrigger() {
            if (!streamerId || isSpinning) return;
            try {
                const res = await fetch(`/api/ov_trigger?userId=${streamerId}&type=slots`);
                const data = await res.json();
                if (data.triggerId && data.triggerId !== lastTriggerId) {
                    lastTriggerId = data.triggerId;
                    pullLever(() => spinReels(data));
                }
            } catch (e) {}
        }

        function animate(time) {
            requestAnimationFrame(animate);
            TWEEN.update(time);
            renderer.render(scene, camera);
        }

        loadConfig();
        animate();
        setInterval(checkTrigger, 2000);
    </script>
</body>
</html>
