<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Лото - Админ (Premium)</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f0f1e; color: #fff; margin:0; padding:20px; overflow-x:hidden; }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { color: #FFD700; text-align: center; font-size: 4vh; text-shadow: 0 0 20px rgba(255,215,0,0.3); }
        
        .admin-layout { display: grid; grid-template-columns: 1fr 350px; gap: 30px; margin-top: 20px; }
        
        .panel { background: rgba(255,255,255,0.03); border: 2px solid rgba(255,215,0,0.2); border-radius: 25px; padding: 30px; box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
        
        .numbers-grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 10px; }
        .grid-number { 
            aspect-ratio: 1; display: flex; align-items:center; justify-content:center;
            background: rgba(0,0,0,0.4); border: 2px solid rgba(255,215,0,0.15); border-radius: 12px;
            cursor: pointer; font-weight: 900; font-size: 20px; transition: all 0.2s; color: rgba(255,255,255,0.6);
        }
        .grid-number:hover { border-color: #FFD700; transform: scale(1.1); color: #fff; }
        .grid-number.drawn { 
            background: linear-gradient(145deg, #FFD700, #DAA520); color: #000; 
            box-shadow: 0 0 25px rgba(255,215,0,0.5); border-color: #fff;
        }
        
        .last-number { 
            font-size: 100px; font-weight: 900; color: #000; 
            background: linear-gradient(145deg, #FFD700, #DAA520);
            width: 180px; height: 180px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
            margin: 0 auto 30px; box-shadow: 0 0 40px rgba(255,215,0,0.6);
            border: 5px solid #fff;
        }
        .empty-last { background: #222; color: #444; box-shadow: none; border-color: #333; }
        
        .stat-card { text-align: center; padding: 20px; background: rgba(0,0,0,0.4); border-radius: 20px; border: 1px solid rgba(255,215,0,0.2); margin-bottom: 15px; }
        .stat-val { font-size: 36px; font-weight: 900; color: #FFD700; }
        
        button { 
            background: linear-gradient(90deg, #FFD700, #FFA500); color: #000; border: none; 
            padding: 20px; border-radius: 15px; font-weight: 900; font-size: 18px; cursor: pointer; 
            transition: 0.3s; width: 100%; box-shadow: 0 5px 15px rgba(255,215,0,0.2);
        }
        button:hover { transform: translateY(-3px); box-shadow: 0 10px 25px rgba(255,215,0,0.4); }
        .btn-danger { background: linear-gradient(90deg, #ff4444, #cc0000); color: #fff; }

        @keyframes bounce { 0%,100%{transform:scale(1);} 50%{transform:scale(1.15);} }
    </style>
</head>
<body>
    <div class="container">
        <h1>🛡️ КРУПНАЯ АДМИН-ПАНЕЛЬ</h1>
        
        <div class="admin-layout">
            <div class="panel">
                <div class="numbers-grid" id="numbersGrid"></div>
                <div style="margin-top: 30px;">
                    <button class="btn-danger" onclick="clearAll()">🧨 СБРОСИТЬ ВСЮ ИГРУ</button>
                </div>
            </div>

            <div class="sidebar">
                <div class="panel">
                    <div id="lastNumber" class="last-number empty-last">—</div>
                    <div class="stat-card">
                        <div style="color: #FFD700; opacity: 0.7;">ВЫПАЛО</div>
                        <div class="stat-val" id="drawnCount">0</div>
                    </div>
                    <div class="stat-card">
                        <div style="color: #FFD700; opacity: 0.7;">ОСТАЛОСЬ</div>
                        <div class="stat-val" id="remainingCount">90</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const query = new URLSearchParams(window.location.search);
        const lobbyId = query.get('lobbyId');
        const userId = query.get('userId');

        let drawnNumbers = new Set();
        let drawnOrder = [];
        let lockPollUntil = 0;

        function initGrid() {
            const grid = document.getElementById('numbersGrid');
            grid.innerHTML = '';
            for (let i = 1; i <= 90; i++) {
                const cell = document.createElement('div');
                cell.className = 'grid-number';
                cell.textContent = i;
                cell.dataset.number = i;
                cell.onclick = () => toggleNumber(i);
                grid.appendChild(cell);
            }
        }

        async function toggleNumber(num) {
            if (drawnNumbers.has(num)) {
                if (confirm(`Удалить ${num}?`)) {
                    lockPollUntil = Date.now() + 4000;
                    drawnNumbers.delete(num);
                    drawnOrder = drawnOrder.filter(n => n !== num);
                    updateDisplay();
                    await fetch('/api/loto', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ action: 'undo_number', lobbyId, userId, number: num })
                    });
                }
            } else {
                lockPollUntil = Date.now() + 4000;
                drawnNumbers.add(num);
                drawnOrder.push(num);
                updateDisplay();
                await fetch('/api/loto', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'draw_number', lobbyId, userId, number: num })
                });
            }
        }

        async function clearAll() {
            if (!confirm('ТОЧНО СБРОСИТЬ ВСЕ?')) return;
            lockPollUntil = Date.now() + 5000;
            drawnNumbers.clear();
            drawnOrder = [];
            updateDisplay();
            await fetch('/api/loto', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: 'reset_numbers', lobbyId, userId })
            });
        }

        function updateDisplay() {
            document.querySelectorAll('.grid-number').forEach(c => {
                const n = parseInt(c.dataset.number);
                c.classList.toggle('drawn', drawnNumbers.has(n));
            });
            document.getElementById('drawnCount').textContent = drawnNumbers.size;
            document.getElementById('remainingCount').textContent = 90 - drawnNumbers.size;
            
            const lastEl = document.getElementById('lastNumber');
            if (drawnOrder.length > 0) {
                const last = drawnOrder[drawnOrder.length - 1];
                if (lastEl.textContent != last) {
                    lastEl.textContent = last;
                    lastEl.classList.remove('empty-last');
                    lastEl.style.animation = 'none';
                    setTimeout(() => lastEl.style.animation = 'bounce 0.5s ease', 10);
                }
            } else {
                lastEl.textContent = '—';
                lastEl.classList.add('empty-last');
            }
        }

        async function loadFromServer() {
            if (Date.now() < lockPollUntil) return;
            try {
                const res = await fetch(`/api/loto?action=get_state&lobbyId=${lobbyId}`, { cache: 'no-store' });
                const data = await res.json();
                if (data.drawn) {
                    drawnOrder = data.drawn.map(Number);
                    drawnNumbers = new Set(drawnOrder);
                    updateDisplay();
                }
            } catch(e) {}
        }

        initGrid();
        setInterval(loadFromServer, 2000);
    </script>
</body>
</html>
