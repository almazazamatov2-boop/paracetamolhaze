<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Лото - Админ-панель</title>
    <style>
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0f0f1e; color: #fff; margin:0; padding:20px; }
        .container { max-width: 1000px; margin: 0 auto; }
        h1 { color: #FFD700; text-align: center; margin-bottom: 30px; }
        
        .admin-layout { display: grid; grid-template-columns: 1fr 300px; gap: 20px; }
        
        .panel { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,215,0,0.2); border-radius: 15px; padding: 20px; }
        
        .numbers-grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 8px; margin-bottom: 20px; }
        .grid-number { 
            aspect-ratio: 1; display: flex; align-items:center; justify-content:center;
            background: rgba(0,0,0,0.3); border: 1px solid rgba(255,215,0,0.1); border-radius: 8px;
            cursor: pointer; font-weight: bold; transition: all 0.2s;
        }
        .grid-number:hover { border-color: #FFD700; transform: scale(1.05); }
        .grid-number.drawn { background: #FFD700; color: #000; box-shadow: 0 0 15px rgba(255,215,0,0.4); }
        
        .sidebar { display: flex; flex-direction: column; gap: 20px; }
        
        .stat-card { text-align: center; padding: 15px; background: rgba(0,0,0,0.2); border-radius: 10px; border: 1px solid rgba(255,215,0,0.1); }
        .stat-val { font-size: 24px; font-weight: bold; color: #FFD700; }
        
        .last-number { 
            font-size: 80px; font-weight: 900; color: #000; background: #FFD700;
            width: 140px; height: 140px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
            margin: 0 auto 20px; box-shadow: 0 0 30px rgba(255,215,0,0.5);
        }
        .empty-last { background: #333; color: #666; box-shadow: none; }
        
        .drawn-list { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 20px; }
        .drawn-barrel { 
            width: 45px; height: 45px; background: #DAA520; color: #000; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; font-weight: bold; position: relative;
        }
        .drawn-barrel .remove { 
            position: absolute; top: -5px; right: -5px; background: #ff4444; color: #fff;
            width: 18px; height: 18px; border-radius: 50%; font-size: 12px; display: flex;
            align-items: center; justify-content: center; cursor: pointer; visibility: hidden;
        }
        .drawn-barrel:hover .remove { visibility: visible; }
        
        button { 
            background: #FFD700; color: #000; border: none; padding: 12px 20px; border-radius: 8px;
            font-weight: bold; cursor: pointer; transition: all 0.2s; width: 100%;
        }
        button:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(255,215,0,0.3); }
        .btn-danger { background: #ff4444; color: #fff; }
        
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { background: rgba(255,255,255,0.1); color: #ccc; width: auto; font-size: 14px; }
        .tab-btn.active { background: #FFD700; color: #000; }

        @keyframes bounce { 
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🛡️ Панель Управления Лото</h1>
        
        <div class="tabs">
            <button class="tab-btn active" id="tabMain" onclick="showTab('main')">Игра</button>
            <button class="tab-btn" id="tabPlayers" onclick="showTab('players')">Игроки</button>
        </div>

        <div class="admin-layout">
            <div class="panel" id="mainPanel">
                <div class="numbers-grid" id="numbersGrid"></div>
                
                <div style="display:flex; gap:10px;">
                    <button class="btn-danger" onclick="clearAll()">🧨 Сбросить все числа</button>
                </div>
                
                <div class="drawn-list" id="drawnList"></div>
            </div>

            <div class="sidebar">
                <div class="panel">
                    <div id="lastNumber" class="last-number empty-last">—</div>
                    <div class="stat-card" style="margin-bottom:10px;">
                        <div class="stat-label">Выпало</div>
                        <div class="stat-val" id="drawnCount">0</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Осталось</div>
                        <div class="stat-val" id="remainingCount">90</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const query = new URLSearchParams(window.location.search);
        const lobbyId = query.get('lobbyId');
        const userId = query.get('userId');

        let drawnNumbers = new Set();
        let drawnOrder = [];
        let lockPollUntil = 0;

        // Инициализация
        function initGrid() {
            const grid = document.getElementById('numbersGrid');
            grid.innerHTML = '';
            for (let i = 1; i <= 90; i++) {
                const cell = document.createElement('div');
                cell.className = 'grid-number';
                cell.textContent = i;
                cell.dataset.number = i;
                cell.onclick = () => toggleNumber(i);
                grid.appendChild(cell);
            }
        }

        function toggleNumber(num) {
            if (drawnNumbers.has(num)) {
                if (confirm(`Удалить бочонок ${num}?`)) removeNumber(num);
            } else {
                addNumberToDrawn(num);
            }
        }

        async function addNumberToDrawn(num) {
            if (!lobbyId || !userId) return;
            
            lockPollUntil = Date.now() + 3000;
            
            // Оптимистично
            drawnOrder.push(num);
            drawnNumbers.add(num);
            updateDisplay();

            try {
                const res = await fetch('/api/loto', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'draw_number', lobbyId, userId, number: num })
                });
                const data = await res.json();
                if (data.drawn) {
                    drawnOrder = data.drawn.map(Number);
                    drawnNumbers = new Set(drawnOrder);
                    updateDisplay();
                }
            } catch(e) {
                lockPollUntil = 0;
                await loadFromServer();
            }
        }

        async function removeNumber(num) {
            if (!lobbyId || !userId) return;
            
            lockPollUntil = Date.now() + 3000;
            drawnOrder = drawnOrder.filter(n => n !== num);
            drawnNumbers.delete(num);
            updateDisplay();

            try {
                const res = await fetch('/api/loto', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'undo_number', lobbyId, userId, number: num })
                });
                const data = await res.json();
                if (data.all) {
                    drawnOrder = data.all.map(Number);
                    drawnNumbers = new Set(drawnOrder);
                    updateDisplay();
                }
            } catch(e) {
                lockPollUntil = 0;
                await loadFromServer();
            }
        }

        async function clearAll() {
            if (!confirm('Сбросить ВСЁ?')) return;
            lockPollUntil = Date.now() + 3000;
            drawnOrder = [];
            drawnNumbers.clear();
            updateDisplay();

            try {
                await fetch('/api/loto', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'reset_numbers', lobbyId, userId })
                });
            } catch(e) {}
        }

        function updateDisplay() {
            document.querySelectorAll('.grid-number').forEach(cell => {
                const n = parseInt(cell.dataset.number);
                cell.classList.toggle('drawn', drawnNumbers.has(n));
            });

            const list = document.getElementById('drawnList');
            list.innerHTML = '';
            drawnOrder.forEach(n => {
                const b = document.createElement('div');
                b.className = 'drawn-barrel';
                b.textContent = n;
                list.appendChild(b);
            });

            document.getElementById('drawnCount').textContent = drawnOrder.length;
            document.getElementById('remainingCount').textContent = 90 - drawnOrder.length;

            const lastEl = document.getElementById('lastNumber');
            if (drawnOrder.length > 0) {
                const last = drawnOrder[drawnOrder.length - 1];
                if (lastEl.textContent != last) {
                    lastEl.textContent = last;
                    lastEl.classList.remove('empty-last');
                    lastEl.style.animation = 'none';
                    setTimeout(() => lastEl.style.animation = 'bounce 0.5s ease', 10);
                }
            } else {
                lastEl.textContent = '—';
                lastEl.classList.add('empty-last');
            }
        }

        async function loadFromServer() {
            if (!lobbyId || Date.now() < lockPollUntil) return;
            try {
                const res = await fetch(`/api/loto?action=get_state&lobbyId=${lobbyId}`, { cache: 'no-store' });
                const data = await res.json();
                if (data.drawn) {
                    drawnOrder = data.drawn.map(Number);
                    drawnNumbers = new Set(drawnOrder);
                    updateDisplay();
                }
            } catch(e) {}
        }

        function showTab(tab) {
            document.getElementById('mainPanel').style.display = tab === 'main' ? 'block' : 'none';
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.id === 'tab' + tab.charAt(0).toUpperCase() + tab.slice(1)));
        }

        initGrid();
        loadFromServer();
        setInterval(loadFromServer, 3000);
    </script>
</body>
</html>
