<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Лото - Premium Edition</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    body {
      font-family:'Segoe UI', sans-serif;
      background: radial-gradient(circle at center, #1a1a2e 0%, #0f0f1e 100%);
      height: 100vh; color:#fff; overflow:hidden;
    }
    
    .screen { display:none; height: 100vh; padding:20px; animation:fadeIn .3s ease-out; position:relative; overflow: hidden; }
    .screen.active { display:flex; flex-direction:column; align-items:center; }
    @keyframes fadeIn { from{opacity:0; transform:translateY(10px);} to{opacity:1; transform:translateY(0);} }

    /* ШАПКА */
    .header{ width: 100%; display:flex; align-items:center; justify-content:space-between; padding: 2vh 30px; }
    .back-btn{ background:none; border:none; color:#FFD700; font-size: 5vh; cursor:pointer; }
    .header-title{ font-size: 4vh; font-weight:900; color:#FFD700; text-shadow: 0 0 15px rgba(255,215,0,0.3); }

    /* МЕНЮ */
    .logo-big{ text-align:center; margin-top: 5vh; margin-bottom: 5vh; }
    .logo-text{
      font-size: 15vh; font-weight:900;
      background: linear-gradient(135deg, #FFD700 0%, #FFA500 100%);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent;
      text-shadow:0 0 50px rgba(255,215,0,0.4);
    }
    .menu-buttons{ width: 90%; max-width:600px; display: flex; flex-direction: column; gap: 2vh; }
    .menu-btn{
      width:100%; padding: 3vh;
      background: linear-gradient(145deg, #2a2a3e 0%, #1f1f2e 100%);
      border: 3px solid #FFD700; border-radius:30px;
      color:#FFD700; font-size: 3.5vh; font-weight:900; cursor:pointer;
      transition:all .2s ease; display:flex; align-items:center; justify-content:center; gap:20px;
    }
    .menu-btn:hover{ transform:translateY(-5px); box-shadow: 0 15px 40px rgba(255,215,0,0.4); }

    /* ЭКРАН ИГРЫ — ЭТО ГЛАВНОЕ */
    .game-container {
      width: 98vw; height: 90vh;
      display: flex; flex-direction: column;
      justify-content: space-around; align-items: center;
    }
    
    .drawn-numbers {
      width: 100%; max-width: 1600px;
      background:rgba(0,0,0,0.6); border: 3px solid rgba(255,215,0,0.4);
      border-radius:25px; padding: 1vh;
    }
    .drawn-list { display:flex; flex-wrap:nowrap; gap:1.5vh; overflow-x:hidden; padding: 10px; }
    .drawn-number {
      width: 11vh; height: 11vh; min-width: 11vh;
      background: linear-gradient(145deg, #FFD700 0%, #DAA520 100%);
      border-radius:50%; display:flex; align-items:center; justify-content:center;
      font-weight:900; color:#000; font-size: 6.5vh;
      box-shadow:0 10px 25px rgba(0,0,0,0.6); flex-shrink:0;
      animation: popIn 0.4s cubic-bezier(.34,1.56,.64,1);
    }

    .card-wrapper {
      width: 100%; max-width: 1600px;
      background: linear-gradient(145deg, #2a2a3e 0%, #1f1f2e 100%);
      border: 5px solid #FFD700; border-radius:35px; 
      padding: 20px; box-shadow: 0 30px 80px rgba(0,0,0,0.9);
    }
    .loto-card {
      display:grid; grid-template-columns:repeat(9,1fr); grid-template-rows:repeat(3,1fr);
      gap: 15px; background:rgba(0,0,0,0.4); padding:15px; border-radius:20px;
    }
    .cell {
      aspect-ratio: 1.35;
      background: linear-gradient(145deg, #3a3a4e 0%, #2a2a3e 100%);
      border: 3px solid rgba(255,215,0,0.3); border-radius:18px;
      display:flex; align-items:center; justify-content:center;
      font-size: 9vh; font-weight:900; color:#fff;
      cursor:pointer; position:relative; overflow:hidden;
    }
    .cell.empty { background:rgba(0,0,0,0.5); border: 1px solid rgba(255,215,0,0.1); cursor:default; }
    .cell.marked {
      background: linear-gradient(145deg, #DAA520 0%, #B8860B 100%);
      color: transparent; border-color: #fff; 
      box-shadow: 0 0 40px rgba(255,215,0,0.5);
    }
    .mark-icon {
      position: absolute; inset: 0; display:flex; align-items:center; justify-content:center;
      pointer-events:none; z-index: 2;
    }
    .mark-icon img { width: 90%; height: 90%; object-fit: cover; border-radius: 50%; }
    .mark-icon span { font-size: 8vh; }

    /* ФУТЕР ИГРЫ */
    .game-footer { width: 100%; display: flex; justify-content: space-between; align-items: center; padding: 0 5vw; }
    .stats-box { font-size: 5vh; font-weight: 900; color: #FFD700; text-shadow: 0 0 20px rgba(255,215,0,0.4); }
    .creator-btns { display: flex; gap: 20px; }
    .btn-action { 
      padding: 1.5vh 30px; background: rgba(255,215,0,0.1); border: 2px solid #FFD700;
      border-radius: 15px; color: #FFD700; font-weight: 800; font-size: 16px; cursor: pointer;
    }

    /* ВСПОМОГАТЕЛЬНЫЕ ЭКРАНЫ */
    .input-card {
      width: 90%; max-width: 600px; padding: 40px; background: rgba(0,0,0,0.4);
      border: 3px solid #FFD700; border-radius: 30px; display: flex; flex-direction: column; gap: 20px;
    }
    .input-field {
      width: 100%; padding: 20px; background: rgba(255,215,0,0.05); border: 2px solid rgba(255,215,0,0.3);
      border-radius: 15px; color: #fff; font-size: 24px; font-weight: 900; outline: none; text-align: center;
    }
    .input-field:focus { border-color: #FFD700; background: rgba(255,215,0,0.1); }

    #connStatus { position:fixed; top:20px; right:30px; z-index:9999; font-weight:900; display:flex; align-items:center; gap:10px; }
    .dot { width:12px; height:12px; border-radius:50%; background:#f00; }
    .dot.online { background:#0f0; box-shadow: 0 0 15px #0f0; }

    @keyframes popIn { 0%{transform:scale(0);} 100%{transform:scale(1);} }
  </style>
</head>
<body>

  <div id="connStatus"><div class="dot" id="connDot"></div> <span id="connText">OFFLINE</span></div>

  <!-- MENU -->
  <div class="screen active" id="mainMenu">
    <div class="logo-big"><div class="logo-text">ЛОТО</div></div>
    <div class="menu-buttons">
      <button class="menu-btn" onclick="showScreen('lobbiesScreen')">🎮 ИГРАТЬ</button>
      <button class="menu-btn" onclick="showScreen('profileScreen')">👤 ПРОФИЛЬ</button>
      <button class="menu-btn" onclick="showScreen('createLobbyScreen')">➕ СОЗДАТЬ ЛОББИ</button>
      <button class="menu-btn" id="adminMenuBtn" style="display:none; border-color: #ff4444; color: #ff4444;" onclick="showScreen('adminPanelScreen')">🛡️ АДМИН</button>
    </div>
  </div>

  <!-- LOBBIES -->
  <div class="screen" id="lobbiesScreen">
    <div class="header">
      <button class="back-btn" onclick="showScreen('mainMenu')">‹</button>
      <div class="header-title">ЛОББИ</div>
      <div></div>
    </div>
    <div class="input-card">
      <input type="text" class="input-field" id="lobbyCodeInput" placeholder="КОД ЛОББИ (6 знаков)">
      <button class="menu-btn" onclick="joinByCode()">ВОЙТИ</button>
    </div>
  </div>

  <!-- CREATE LOBBY -->
  <div class="screen" id="createLobbyScreen">
    <div class="header">
      <button class="back-btn" onclick="showScreen('mainMenu')">‹</button>
      <div class="header-title">СОЗДАТЬ</div>
      <div></div>
    </div>
    <div class="input-card">
      <input type="text" class="input-field" id="lobbyNameInput" placeholder="НАЗВАНИЕ">
      <button class="menu-btn" onclick="createLobby()">СОЗДАТЬ</button>
    </div>
  </div>

  <!-- WAIT SCREEN -->
  <div class="screen" id="lobbyWaitScreen">
    <div class="header">
      <button class="back-btn" onclick="leaveLobby()">‹</button>
      <div class="header-title">ОЖИДАНИЕ</div>
      <div></div>
    </div>
    <div class="logo-big" style="margin-top: 2vh;">
      <div id="waitCode" style="font-size: 10vh; color: #FFD700; font-weight: 900; letter-spacing: 15px;">------</div>
      <div id="waitStatus" style="font-size: 3vh; color: rgba(255,215,0,0.6);">Ждем игроков...</div>
    </div>
    <div id="adminStartBtnContainer" style="display:none; width: 90%; max-width: 600px;">
       <button class="menu-btn" style="background: #FFD700; color: #000;" onclick="sendStartGame()">НАЧАТЬ ИГРУ</button>
    </div>
  </div>

  <!-- GAME SCREEN -->
  <div class="screen" id="gameScreen">
    <div class="game-container">
      <div class="drawn-numbers">
        <div class="drawn-list" id="gameDrawnList"></div>
      </div>

      <div class="card-wrapper">
        <div class="loto-card" id="gameLotoCard"></div>
      </div>

      <div class="game-footer">
        <div class="stats-box">ОТМЕЧЕНО: <span id="gameMarkedCount">0</span>/15</div>
        <div class="creator-btns" id="creatorGameBtns"></div>
      </div>
    </div>
  </div>

  <script>
    let userId = localStorage.getItem('userId') || 'u' + Math.random().toString(36).substr(2, 9);
    localStorage.setItem('userId', userId);
    let userName = localStorage.getItem('userName') || 'Игрок_' + Math.floor(Math.random()*100);
    
    let currentLobbyId = null;
    let cardNumbers = [];
    let markedCells = new Set();
    let drawnNumbers = new Set();
    let isAdmin = false;
    let currentMarkStyle = localStorage.getItem('markStyle') || 'check';

    const MARK_STYLES = [
      { id: 'check', emoji: '✓' },
      { id: 'almaz', img: 'data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAIAAAACACAYAAADDPmHLAABo8ElEQVR4nL392Y9s2ZXmif32cAYbfb5jzAMjGBwyGSQzyRwrs0pV6s6aulsooQAJanQ/SNC7ngRID3rQe/c/IUGAIFRXdQFCddaQyWQymQPJYDAGRsSNuLPPbm7TOWdPelj7mHuwugXkFXSNuOC9Hu7mZrb3Xnutb33ftxTP8PgH334nhRDwPmCtxmqF1hprLb5zpBBAQ1kNMcbSth1VVaKUolmtqeuarutYr9doo9AaytISQgLkuZRSkDTGGKqq4vLyEuc8MUaUThgNk9GI2eU50XvqQSmvoSjY2d9mve5Yrxsmky28jwzqAYlIVdWs10u0gu3phNFoxPn5OW3b8sYbb/DDH/5QfodSdF2HMRZrCwIJrTWgmF3O0VoznEwAGA3GrJuOw8MjBoMaHwIGTYoBay0xRoIPVGXJoC4xCtbrFTEllFKEEKiqiqqqmK+WpJQYlBWESAgBrTUhyWsCGAwGJGC5XFJWFSFFvPf8m59/rv62a2mfZQPEGBmPxwBopSgLjfeBruso64roPdYalNbEFChKTYyeRKKsClmIumQ4qqnrAU2zRmtFjJEYk3yooxGLxRJrLVVVMmGE6xxt16JUQitNjIG33noLqxU3b93g4GAfWxRMd7b5+KOPuZwvuX3rBoPBiIuLC548fcxkMgESO9tbvPrqq3zwwQe0zvG1b3yT4XDIb37/+7zy6qscHx3z6quvUNcD7t27x5//6Edsb21zuVjQdo6UEm3bsr29zWRrjC0amvWYuq7QSuOcgwQg32eMYlBX1IUFIinJRlFKkWJEG0NUabP5lVKYsqBUJT4ErFKUZUmMEVsUGGNAK1AaE4P8+xkez7QB2rYlxkhZllhjWK9atNY0TcOgHhCcw3uHKcp8igzOOUII1GVJSlBVFWDx3tGsW0IIxBQ2GyylyPn5GdbKS/TBE0NAG814MuLVV17lrTdf586tmzjXcXp2ws1bNxiORpyez9ja2aF1iQ8/+ojT03NC8CxXS7a3t9maTvnqO++wt39A0/2Ms/NLBsMjbt+5Q0RzenrOzt4+48kW88WCO3df4DvfTaxWa4rjY4pCos39R484Pz+X96gNVil811GWJUqB0ZroA6N6gNaaGCNt22GMLHAfabTWBBLRh83i+xDk/WpNAgpjID9H5x2GRFRADGgUpiie3wbQWrO1tQ1A167RWqO1pq5rqqrCa433Hd77zRstioKiKNDIv7uu23w9xkTwkaQSWiuM0bRdg1KJ8WREXVeUZYHWMByO+Na3fo2XX3mFi/MzTKlpfeTGzRv40IEec/PWLR48eszR0VPOLmY8ePiQra0pKcHXv/4N9vZ3+W/+m/+Wf/hP/jGvvv46Ryen3H/8mJt37vL6G2/ypz/4U4bDIat1w+NHj5jNZrz77W8zmUxRSvHCiy8xHA5597vf5ZNPPuHBgwccHR5R6oK2aVgtljjvKYxFKyiKAqNNDvkJ59mEfqUUISVCiui8+EkhESRGtNIkBYGIToGUEjEmtHckEqHzFEpj7DMt5bNtgBs3blCWJW3bUlYVRiG7XitUUpAiznX4mHJkWGNtgdKK0DmsrXHO4b2nbTusLTDGEqKjqgqUAq0VW1sT7t69zd7eLtPpBB8cb77xJheXF/yrf/Uv+MpX3mRvb49PP/+MV154kdlsxmLV8osPPubxk6d0nefk+BStDd/5zm9w//59vvXuu/zVX/6YVbPmp+/9lN39PV594zXOz8548PgRk60+9/vP' }
    ];

    window.onload = () => {
      restoreSession();
      initWS();
    };

    function restoreSession() {
      const _sid = sessionStorage.getItem('currentLobbyId');
      if (_sid) {
        currentLobbyId = _sid;
        isAdmin = sessionStorage.getItem('isAdmin') === 'true';
        const _card = sessionStorage.getItem('cardNumbers');
        if (_card) cardNumbers = JSON.parse(_card);
        const _marked = sessionStorage.getItem('markedCells');
        if (_marked) markedCells = new Set(JSON.parse(_marked));
        
        if (sessionStorage.getItem('gameStarted') === 'true') {
          showScreen('gameScreen');
          renderCard();
        } else if (sessionStorage.getItem('lobbyJoined') === 'true') {
          showScreen('lobbyWaitScreen');
          document.getElementById('waitCode').innerText = sessionStorage.getItem('lobbyCode') || '------';
        }
      }
    }

    function initWS() {
      setConnStatus('connected', 'ONLINE');
      setInterval(syncState, 2000);
    }

    async function syncState() {
      if (!currentLobbyId) return;
      try {
        const res = await fetch(`/api/loto?action=get_state&lobbyId=${currentLobbyId}`);
        const data = await res.json();
        
        if (data.status === 'playing' && !document.getElementById('gameScreen').classList.contains('active')) {
          showScreen('gameScreen');
          sessionStorage.setItem('gameStarted', 'true');
        }
        
        if (data.drawn) {
          const newDrawn = data.drawn.map(Number);
          if (JSON.stringify([...drawnNumbers]) !== JSON.stringify(newDrawn)) {
            drawnNumbers = new Set(newDrawn);
            updateDrawnDisplay();
          }
        }
        
        if (data.card && !cardNumbers.length) {
            cardNumbers = data.card;
            sessionStorage.setItem('cardNumbers', JSON.stringify(cardNumbers));
            renderCard();
        }
      } catch(e) {}
    }

    function setConnStatus(st, text) {
      const dot = document.getElementById('connDot');
      const txt = document.getElementById('connText');
      dot.className = 'dot ' + (st === 'connected' ? 'online' : '');
      txt.innerText = text;
    }

    function showScreen(id) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      const sc = document.getElementById(id);
      if (sc) sc.classList.add('active');
    }

    // ЛОГИКА ИГРЫ
    function renderCard() {
      const cardEl = document.getElementById('gameLotoCard');
      cardEl.innerHTML = '';
      cardNumbers.forEach(rowArr => {
        rowArr.forEach(num => {
          const cell = document.createElement('div');
          cell.className = num === null ? 'cell empty' : 'cell';
          if (num !== null) {
            cell.innerText = num;
            if (markedCells.has(num)) {
              cell.classList.add('marked');
              applyMarkIcon(cell);
            }
            cell.onclick = () => toggleCell(num, cell);
          }
          cardEl.appendChild(cell);
        });
      });
      updateAdminBtns();
    }

    function applyMarkIcon(cell) {
      const style = MARK_STYLES.find(s => s.id === currentMarkStyle) || MARK_STYLES[0];
      let icon = cell.querySelector('.mark-icon');
      if (!icon) {
        icon = document.createElement('div');
        icon.className = 'mark-icon';
        cell.appendChild(icon);
      }
      if (style.img) {
        icon.innerHTML = `<img src="${style.img}">`;
      } else {
        icon.innerHTML = `<span>${style.emoji}</span>`;
      }
    }

    function toggleCell(num, cell) {
      if (!drawnNumbers.has(num)) return;
      if (markedCells.has(num)) {
        markedCells.delete(num);
        cell.classList.remove('marked');
        if (cell.querySelector('.mark-icon')) cell.querySelector('.mark-icon').remove();
      } else {
        markedCells.add(num);
        cell.classList.add('marked');
        applyMarkIcon(cell);
      }
      sessionStorage.setItem('markedCells', JSON.stringify([...markedCells]));
      document.getElementById('gameMarkedCount').innerText = markedCells.size;
    }

    function updateDrawnDisplay() {
      const list = document.getElementById('gameDrawnList');
      list.innerHTML = '';
      const arr = [...drawnNumbers];
      arr.forEach(n => {
        const el = document.createElement('div');
        el.className = 'drawn-number';
        el.innerText = n;
        list.appendChild(el);
      });
      list.scrollLeft = list.scrollWidth;
    }

    function updateAdminBtns() {
      const container = document.getElementById('creatorGameBtns');
      if (isAdmin) {
        container.innerHTML = `
          <button class="btn-action" onclick="window.open('/lotomal/admin.html?lobbyId='+currentLobbyId+'&userId='+userId, '_blank')">🛡️ АДМИН</button>
        `;
      }
    }

    // ACTIONS
    async function joinByCode() {
       const code = document.getElementById('lobbyCodeInput').value.trim().toUpperCase();
       if (code.length < 3) return;
       try {
         const res = await fetch(`/api/loto?action=join_lobby&code=${code}&userId=${userId}&nickname=${userName}`);
         const data = await res.json();
         if (data.lobbyId) {
            currentLobbyId = data.lobbyId;
            sessionStorage.setItem('currentLobbyId', currentLobbyId);
            sessionStorage.setItem('lobbyJoined', 'true');
            sessionStorage.setItem('lobbyCode', code);
            document.getElementById('waitCode').innerText = code;
            showScreen('lobbyWaitScreen');
         }
       } catch(e) { alert('Ошибка входа'); }
    }

    async function createLobby() {
       const name = document.getElementById('lobbyNameInput').value || 'Игра';
       try {
         const res = await fetch(`/api/loto?action=create_lobby&name=${name}&userId=${userId}&nickname=${userName}`);
         const data = await res.json();
         if (data.lobbyId) {
            currentLobbyId = data.lobbyId;
            isAdmin = true;
            sessionStorage.setItem('currentLobbyId', currentLobbyId);
            sessionStorage.setItem('isAdmin', 'true');
            sessionStorage.setItem('lobbyJoined', 'true');
            sessionStorage.setItem('lobbyCode', data.code);
            document.getElementById('waitCode').innerText = data.code;
            document.getElementById('adminStartBtnContainer').style.display = 'block';
            showScreen('lobbyWaitScreen');
         }
       } catch(e) { alert('Ошибка создания'); }
    }

    async function sendStartGame() {
       await fetch(`/api/loto?action=start_game&lobbyId=${currentLobbyId}&userId=${userId}`);
    }

    function leaveLobby() {
      sessionStorage.clear();
      location.reload();
    }

    function leaveGame() {
      if (confirm('ВЫЙТИ?')) {
        sessionStorage.clear();
        location.reload();
      }
    }
  </script>
</body>
</html>
